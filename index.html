<style>
:root{
  /* ---- Light "datasheet" (default). Accents = Okabe-Ito (CVD-safe). ---- */
  --paper:#F1F3F0;      /* pale cool datasheet ground, not warm cream */
  --panel:#F8FAF7;      /* faint lift for figures */
  --ink:#15181A;        /* near-black, slightly cool */
  --muted:#5A6066;      /* secondary text, mono metadata */
  --faint:#8A9098;      /* tertiary */
  --hair:#CDD2CC;       /* hairlines, ticks */
  --hair-2:#DEE2DC;
  --link:#0072B2;       /* Okabe-Ito blue: interactive + focus */
  --signal:#D55E00;     /* Okabe-Ito vermillion: the EEG trace (signal) */
  --signal-soft:rgba(213,94,0,.13);
  --fig-honest:#D55E00; /* AUROC honest bar */
  --fig-leaky:#8A9098;  /* AUROC leaky bar (muted) */
  --pd:#D55E00;         /* class: Parkinson (Okabe-Ito vermillion) */
  --hc:#0072B2;         /* class: healthy control (Okabe-Ito blue) */
  /* Okabe-Ito section spectrum: an ordered, accessible rainbow used as index */
  --c0:#0072B2; --c1:#009E73; --c2:#D55E00; --c3:#E69F00;
  --c4:#56B4E9; --c5:#CC79A7; --c6:#009E73; --c7:#0072B2;
  --sans:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --measure:66ch;
  --col-label:168px;
  --gap:2.6rem;
}
/* ---- Dark "editor": true-black OLED + One Dark (BLK theme) --------------- */
html[data-theme="dark"]{
  --paper:#000000;      /* true black for OLED */
  --panel:#0B0C0D;
  --ink:#FFFFFF;
  --muted:#9BA3AD;
  --faint:#7F848E;      /* One Dark comment gray */
  --hair:#1C1D20;
  --hair-2:#141517;
  --link:#61AFEF;       /* One Dark function blue */
  --signal:#D19A66;     /* One Dark constant orange: the trace on black */
  --signal-soft:rgba(209,154,102,.16);
  --fig-honest:#98C379; /* One Dark string green: the honest number */
  --fig-leaky:#5C6169;
  --pd:#E06C75;         /* class: Parkinson (One Dark variable red) */
  --hc:#61AFEF;         /* class: healthy control (One Dark function blue) */
  /* One Dark semantic colors as the section spectrum */
  --c0:#61AFEF; --c1:#98C379; --c2:#E06C75; --c3:#D19A66;
  --c4:#56B6C2; --c5:#C678DD; --c6:#98C379; --c7:#E5C07B;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-weight:400;font-size:17px;line-height:1.62;
  letter-spacing:.002em;-webkit-font-smoothing:antialiased;
  padding:0;transition:background .3s ease,color .3s ease;
}
.wrap{max-width:1040px;margin:0 auto;padding:0 clamp(1.25rem,5vw,3rem)}
a{color:inherit;text-decoration:none}
p{margin:0 0 1rem;max-width:var(--measure)}
::selection{background:var(--signal-soft)}

.eyebrow{
  font-family:var(--mono);font-size:.72rem;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
}
.mono{font-family:var(--mono)}

/* ---- Masthead ---------------------------------------------------------- */
.mast{padding:clamp(3rem,9vw,6rem) 0 2.2rem}
.mast-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:2.4rem}
.kicker{display:flex;align-items:center;gap:.7rem;color:var(--muted)}
.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 3px var(--signal-soft);flex:none}
.lang{display:flex;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;border:1px solid var(--hair);background:transparent}
.lang button{
  font:inherit;color:var(--faint);background:none;border:none;cursor:pointer;
  padding:.34rem .6rem;letter-spacing:.1em;transition:color .2s,background .2s;
}
.lang button[aria-pressed="true"]{color:var(--ink);background:var(--panel)}
.lang button:not([aria-pressed="true"]):hover{color:var(--muted)}

/* top-right controls: language + theme, same visual grammar */
.controls{display:flex;gap:.5rem;align-items:stretch}
.theme{display:flex;border:1px solid var(--hair);background:transparent}
.theme button{
  display:flex;align-items:center;justify-content:center;
  width:30px;color:var(--faint);background:none;border:none;cursor:pointer;
  padding:0;transition:color .2s,background .2s;
}
.theme button[aria-pressed="true"]{color:var(--ink);background:var(--panel)}
.theme button:not([aria-pressed="true"]):hover{color:var(--muted)}
.theme svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.name{
  font-weight:600;line-height:1.02;letter-spacing:-.02em;margin:0 0 .5rem;
  font-size:clamp(2.35rem,6.4vw,3.75rem);
}
.role{font-size:clamp(1.02rem,2.4vw,1.18rem);color:var(--muted);font-weight:400;max-width:52ch;margin:0}

/* signal trace: the signature element */
.trace{margin:1.9rem 0 .2rem;width:100%;height:76px;display:block;overflow:visible}
.trace path{fill:none;stroke:var(--signal);stroke-width:1.4;stroke-linejoin:round;stroke-linecap:round;opacity:.92;vector-effect:non-scaling-stroke}
.trace .base{stroke:var(--hair);stroke-width:1;opacity:1}
.trace-cap{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;color:var(--faint);margin-top:.35rem}

.contact{display:flex;flex-wrap:wrap;gap:0 1.6rem;margin-top:1.7rem;font-family:var(--mono);font-size:.82rem}
.contact a{color:var(--muted);padding:.15rem 0;border-bottom:1px solid transparent;transition:color .18s,border-color .18s}
.contact a:hover{color:var(--ink);border-bottom-color:var(--link)}

/* ---- Sections ---------------------------------------------------------- */
.sec{
  display:grid;grid-template-columns:var(--col-label) 1fr;gap:var(--gap);
  padding:2.9rem 0;border-top:1px solid var(--hair-2);
  opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease;
}
.sec.in{opacity:1;transform:none}
.sec-label{position:relative}
.sec-label .eyebrow{position:sticky;top:1.4rem;display:flex;align-items:center;gap:.55rem}
.tick{width:9px;height:9px;flex:none;background:var(--tick,var(--muted));border-radius:1px}
.sec-body{min-width:0}
.lede{font-size:clamp(1.12rem,2.6vw,1.34rem);line-height:1.5;font-weight:400;letter-spacing:-.008em;max-width:38ch}
.lede.small{font-size:1.02rem;line-height:1.6;max-width:var(--measure);color:var(--muted);margin-top:1.1rem}
.lede b{font-weight:600;color:var(--ink)}

/* entries: digital dialect of the CV two-line entry */
.entry{margin:0 0 1.5rem}
.entry:last-child{margin-bottom:0}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:1.2rem}
.org{font-weight:600}
.role-l{font-style:italic;color:var(--ink)}
.meta{font-family:var(--mono);font-size:.76rem;color:var(--muted);white-space:nowrap;letter-spacing:.02em}
@media(max-width:520px){.meta{white-space:normal;text-align:right}}

.work{margin:0 0 2.5rem;padding:0}
.work:last-child{margin-bottom:0}
.work .desc{margin-top:.85rem}
.marks{display:flex;flex-wrap:wrap;gap:.55rem .9rem;margin:.4rem 0 .55rem;padding:0;list-style:none}
.marks li{font-family:var(--mono);font-size:.72rem;color:var(--muted);letter-spacing:.01em}
.marks .v{color:var(--ink);font-weight:500}
.marks .v.sig{color:var(--signal)}
.tags{font-family:var(--mono);font-size:.72rem;color:var(--faint);letter-spacing:.04em;margin-top:.3rem}

.compact .entry{margin-bottom:1.1rem}
.compact .desc{color:var(--muted);font-size:.94rem;margin-top:.25rem;max-width:var(--measure)}

/* skills */
.skills{margin:0;padding:0;list-style:none}
.skills li{padding:.7rem 0;border-bottom:1px solid var(--hair-2);display:grid;grid-template-columns:minmax(120px,180px) 1fr;gap:1rem}
.skills li:last-child{border-bottom:none}
.skills .cat{font-family:var(--mono);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding-top:.12rem}
.skills .val{color:var(--ink)}
@media(max-width:560px){.skills li{grid-template-columns:1fr;gap:.15rem}}

.rec{margin:0;padding:0;list-style:none}
.rec li{padding:.55rem 0;border-bottom:1px solid var(--hair-2);display:flex;gap:1rem;align-items:baseline}
.rec li:last-child{border-bottom:none}
.rec .yr{font-family:var(--mono);font-size:.74rem;color:var(--faint);flex:none;width:5.5rem}

/* AUROC figure ----------------------------------------------------------- */
.fig{margin:1.4rem 0 .4rem;background:var(--panel);border:1px solid var(--hair-2);padding:1.3rem 1.4rem 1.1rem}
.fig-head{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
.fig svg{width:100%;height:auto;display:block}
.fig .bar{transform:scaleX(0);transform-box:fill-box;transform-origin:left center;transition:transform 1.05s cubic-bezier(.22,.61,.36,1)}
.fig.drawn .bar{transform:scaleX(1)}
.fig .bar.d2{transition-delay:.18s}
.fig text{font-family:var(--mono)}
.fig-cap{font-size:.86rem;color:var(--muted);margin:.9rem 0 0;max-width:56ch}
.fig-cap b{color:var(--ink);font-weight:600}

/* footer / colophon */
.colo{border-top:1px solid var(--hair-2);padding:2.6rem 0 3.4rem;margin-top:1rem;
  display:flex;flex-wrap:wrap;justify-content:space-between;gap:1.2rem;
  font-family:var(--mono);font-size:.76rem;color:var(--faint);letter-spacing:.02em}
.colo a{color:var(--muted);border-bottom:1px solid transparent}
.colo a:hover{color:var(--ink);border-bottom-color:var(--signal)}
.colo .note{max-width:42ch;line-height:1.55}

/* interactive leakage demo -------------------------------------------------- */
.demo{margin:.2rem 0 0}
.demo-intro{color:var(--muted);max-width:var(--measure);margin:0 0 1.1rem}
.demo-toggle{display:inline-flex;border:1px solid var(--hair);font-family:var(--mono);font-size:.74rem;margin-bottom:1.3rem}
.demo-toggle button{font:inherit;color:var(--faint);background:none;border:none;cursor:pointer;padding:.42rem .85rem;letter-spacing:.03em;transition:color .2s,background .2s}
.demo-toggle button[aria-pressed="true"]{color:var(--ink);background:var(--panel)}
.demo-toggle button:not([aria-pressed="true"]):hover{color:var(--muted)}
.demo-panels{display:flex;flex-wrap:wrap;gap:1.4rem 2.2rem;align-items:flex-start}
.demo-panel{flex:1 1 270px;min-width:250px}
.demo-panel h4{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:500;margin:0 0 .7rem}
.demo svg{width:100%;height:auto;display:block;overflow:visible}
.demo .dot{stroke:transparent;stroke-width:2.2;transform-box:fill-box;transform-origin:center;transition:stroke .35s ease,transform .35s ease}
.demo .dot.test{stroke:var(--ink);transform:scale(1.16)}
.demo .axis{stroke:var(--hair);stroke-width:1}
.demo .chance{stroke:var(--faint);stroke-width:1;stroke-dasharray:2 3;opacity:.7}
.demo .roc-curve{fill:none;stroke-width:2.4;stroke-linejoin:round;transition:stroke .4s ease}
.demo .roc-band{stroke:none;opacity:.16;transition:fill .4s ease}
.demo[data-split="segment"] .roc-curve,.demo[data-split="segment"] .roc-band,.demo[data-split="segment"] .auroc-val{stroke:var(--fig-leaky);fill:var(--fig-leaky)}
.demo[data-split="subject"] .roc-curve,.demo[data-split="subject"] .roc-band,.demo[data-split="subject"] .auroc-val{stroke:var(--fig-honest);fill:var(--fig-honest)}
.demo .auroc-val{font-family:var(--mono);font-weight:600;stroke:none}
.demo .auroc-lab,.demo .ax-lab{font-family:var(--mono);fill:var(--faint)}
.demo .slab{font-family:var(--mono);fill:var(--muted)}
.demo-legend{display:flex;gap:1.3rem;font-family:var(--mono);font-size:.72rem;color:var(--muted);margin:.8rem 0 0;flex-wrap:wrap}
.demo-legend span{display:inline-flex;align-items:center;gap:.42rem}
.demo-legend svg{width:14px;height:14px;overflow:visible}
.demo-cap{font-size:.9rem;color:var(--muted);max-width:60ch;margin:1.2rem 0 0}
.demo-cap b{color:var(--ink);font-weight:600}

/* posters grid ------------------------------------------------------------- */
.posters{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:640px){.posters{grid-template-columns:1fr}}
.poster{display:flex;flex-direction:column;gap:.7rem;color:inherit;border:1px solid var(--hair-2);padding:.7rem;transition:border-color .2s ease}
.poster:hover{border-color:var(--link)}
.poster-thumb{position:relative;aspect-ratio:4/3;background:var(--panel);border:1px solid var(--hair-2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.poster-thumb img{width:100%;height:100%;object-fit:contain;display:block}
.poster-ph{display:none;font-family:var(--mono);font-size:.72rem;letter-spacing:.2em;color:var(--faint)}
.poster-thumb.noimg img{display:none}
.poster-thumb.noimg .poster-ph{display:flex}
.poster-info{display:flex;flex-direction:column;gap:.22rem}
.poster-title{font-weight:600;line-height:1.32}
.poster-venue{color:var(--muted);font-size:.9rem;line-height:1.4}
.poster-date{font-family:var(--mono);font-size:.74rem;color:var(--faint);letter-spacing:.02em}

/* signal filter demo ------------------------------------------------------- */
.demo .axis{stroke:var(--hair);stroke-width:1}
.sig-raw{fill:none;stroke:var(--faint);stroke-width:1.2;opacity:.85}
.sig-filt{fill:none;stroke:var(--signal);stroke-width:1.7;stroke-linejoin:round;stroke-linecap:round}
.spec-raw{fill:none;stroke:var(--faint);stroke-width:1.1;opacity:.75}
.spec-filt{fill:var(--signal);opacity:.9;stroke:none}
.flabel{font-family:var(--mono);font-size:9px;fill:var(--faint)}
.flabel.sig{fill:var(--signal)}

/* section anchors offset for the sticky nav */
.sec{scroll-margin-top:64px}

/* sticky section nav ------------------------------------------------------- */
.secnav{position:sticky;top:0;z-index:20;display:flex;gap:1.4rem;align-items:center;
  padding:.7rem 0;margin-bottom:1.4rem;background:var(--paper);
  border-bottom:1px solid var(--hair-2)}
.secnav a{font-family:var(--mono);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;transition:color .15s ease}
.secnav a:hover{color:var(--ink)}
@media(max-width:520px){.secnav{gap:1.05rem;overflow-x:auto;-webkit-overflow-scrolling:touch}}

/* project figures ---------------------------------------------------------- */
.project{margin-bottom:2.4rem}
.project:last-child{margin-bottom:0}
.gallery{display:grid;gap:.7rem;margin-bottom:.85rem}
.gallery[data-n="1"]{grid-template-columns:1fr}
.gallery[data-n="2"]{grid-template-columns:1fr 1fr}
.gallery[data-n="3"]{grid-template-columns:repeat(3,1fr)}
.gallery[data-n="4"]{grid-template-columns:1fr 1fr}
.gallery[data-n="m"]{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
@media(max-width:640px){.gallery[data-n="3"],.gallery[data-n="4"]{grid-template-columns:1fr 1fr}}
.fig-thumb{position:relative;display:flex;align-items:center;justify-content:center;
  aspect-ratio:16/9;background:var(--panel);border:1px solid var(--hair-2);
  overflow:hidden}
.fig-thumb img{width:100%;height:100%;object-fit:contain;display:block}
.fig-thumb.noimg img{display:none}
.fig-thumb .poster-ph{display:none}
.fig-thumb.noimg .poster-ph{display:flex}
.outcome{font-size:1.02rem;line-height:1.5;color:var(--ink);max-width:var(--measure);margin:.5rem 0 .2rem}
.outcome.sm{font-size:.95rem;margin:.35rem 0 .15rem}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem}
@media(max-width:640px){.more-grid{grid-template-columns:1fr}}
.project-sm{margin-bottom:0}
.project-sm .gallery{margin-bottom:.7rem}

/* about -------------------------------------------------------------------- */
.about{display:flex;gap:1.8rem;align-items:flex-start;flex-wrap:wrap}
.about-portrait{width:158px;height:198px;object-fit:cover;border:1px solid var(--hair-2);flex:0 0 auto}
.about-main{flex:1 1 340px;min-width:0}
.about-lead{font-size:1.05rem;line-height:1.6;color:var(--ink);max-width:var(--measure);margin:0}
.about-why{margin-top:1.1rem;padding-left:.9rem;border-left:2px solid var(--hair)}
.about-why h4{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 .35rem;font-weight:500}
.about-why p{margin:0;color:var(--muted);line-height:1.6;max-width:var(--measure)}
.about-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.3rem 2rem;margin-top:1.3rem}
.about-block h4{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--faint);margin:0 0 .5rem;font-weight:500}
.about-list{list-style:none;padding:0;margin:0}
.about-list li{padding:.12rem 0;color:var(--muted)}
.about-langs{color:var(--muted);margin:0;line-height:1.6}

a:focus-visible,button:focus-visible{outline:2px solid var(--link);outline-offset:3px}

@media(max-width:760px){
  .sec{grid-template-columns:1fr;gap:1rem;padding:2.3rem 0}
  .sec-label .eyebrow{position:static}
}
@media(prefers-reduced-motion:reduce){
  .sec{transition:none;opacity:1;transform:none}
  .fig .bar{transition:none;transform:scaleX(1)}
  .trace path{transition:none!important}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="mast-top">
      <div class="kicker eyebrow"><span class="dot" aria-hidden="true"></span><span data-k="kicker"></span></div>
      <div class="controls">
        <div class="lang" role="group" aria-label="Language">
          <button type="button" data-lang="en" aria-pressed="true">EN</button>
          <button type="button" data-lang="es" aria-pressed="false">ES</button>
        </div>
        <div class="theme" role="group" aria-label="Theme">
          <button type="button" data-theme-set="light" aria-pressed="true" aria-label="Light theme" title="Light">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
          <button type="button" data-theme-set="dark" aria-pressed="false" aria-label="Dark theme" title="Dark">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
        </div>

/* ---- AUROC figure ------------------------------------------------------ */
function aurocFigure(t){
  const W=640,H=196,padL=132,padR=28,top=34,rowH=52;
  const x=v=>padL+((v-0.5)/0.5)*(W-padL-padR);
  const ticks=[0.5,0.6,0.7,0.8,0.9,1.0];
  const leakY=top, honY=top+rowH+18;
  const seg=[0.99,1.0], sub=[0.63,0.72];
  const barH=13;
  let tickMarks=ticks.map(v=>`<line x1="${x(v).toFixed(1)}" y1="${honY+barH+16}" x2="${x(v).toFixed(1)}" y2="${honY+barH+22}" stroke="var(--hair)"/><text x="${x(v).toFixed(1)}" y="${honY+barH+36}" fill="var(--faint)" font-size="10" text-anchor="middle">${v.toFixed(2)}</text>`).join("");
  const chance=`<line x1="${x(0.5).toFixed(1)}" y1="${top-8}" x2="${x(0.5).toFixed(1)}" y2="${honY+barH+16}" stroke="var(--hair)" stroke-dasharray="2 3"/><text x="${x(0.5).toFixed(1)}" y="${top-14}" fill="var(--faint)" font-size="9.5" text-anchor="middle">chance</text>`;
  const bar=(y,r,cls,color)=>`<rect class="bar ${cls}" x="${x(r[0]).toFixed(1)}" y="${y}" width="${(x(r[1])-x(r[0])).toFixed(1)}" height="${barH}" fill="${color}"/>`;
  const lbl=(y,txt)=>`<text x="${padL-12}" y="${y+barH-2}" fill="var(--muted)" font-size="10.5" text-anchor="end">${txt}</text>`;
  const val=(y,r,color)=>`<text x="${(x(r[1])+8).toFixed(1)}" y="${y+barH-2}" fill="${color}" font-size="10.5" font-weight="500">${r[0].toFixed(2)}–${r[1].toFixed(2)}</text>`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${t.figAria}">
    ${chance}
    ${bar(leakY,seg,"d1","var(--fig-leaky)")}${lbl(leakY,t.figSeg)}${val(leakY,seg,"var(--fig-leaky)")}
    ${bar(honY,sub,"d2","var(--fig-honest)")}${lbl(honY,t.figSub)}${val(honY,sub,"var(--fig-honest)")}
    ${tickMarks}
  </svg>`;
  const fig=el("figure","fig");
  fig.innerHTML=`<div class="fig-head">${t.figHead}</div>${svg}<figcaption class="fig-cap">${t.figCap}</figcaption>`;
  return fig;
}

/* ---- interactive leakage demo ----------------------------------------- */
function erf(x){const t=1/(1+0.3275911*Math.abs(x));const y=1-(((((1.061405429*t-1.453152027)*t+1.421413741)*t-0.284496736)*t+0.254829592)*t)*Math.exp(-x*x);return x>=0?y:-y;}
const _ncdf=x=>0.5*(1+erf(x/Math.SQRT2));
function _ninv(p){const a=[-39.69683028665376,220.9460984245205,-275.9285104469687,138.357751867269,-30.66479806614716,2.506628277459239];const b=[-54.47609879822406,161.5858368580409,-155.6989798598866,66.80131188771972,-13.28068155288572];const c=[-0.007784894002430293,-0.3223964580411365,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783];const d=[0.007784695709041462,0.3224671290700398,2.445134137142996,3.754408661907416];const pl=0.02425,ph=1-pl;let q,r;if(p<pl){q=Math.sqrt(-2*Math.log(p));return(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}if(p<=ph){q=p-0.5;r=q*q;return(((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}q=Math.sqrt(-2*Math.log(1-p));return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
const RX=f=>42+f*246, RY=v=>12+(1-v)*250;
function rocPts(a){const A=Math.SQRT2*_ninv(Math.min(0.999,Math.max(0.501,a)));const p=[[0,0]];for(let i=1;i<=59;i++){const f=i/60;p.push([f,_ncdf(A+_ninv(f))]);}p.push([1,1]);return p;}
const rocPath=a=>"M "+rocPts(a).map(p=>RX(p[0]).toFixed(1)+" "+RY(p[1]).toFixed(1)).join(" L ");
function bandPath(a,sd){const up=rocPts(Math.min(0.999,a+sd)),lo=rocPts(Math.max(0.501,a-sd));return "M "+up.map(p=>RX(p[0]).toFixed(1)+" "+RY(p[1]).toFixed(1)).join(" L ")+" L "+lo.reverse().map(p=>RX(p[0]).toFixed(1)+" "+RY(p[1]).toFixed(1)).join(" L ")+" Z";}

/* ---- signal filter demo (real FFT-domain filtering) -------------------- */
function fft(re,im,inv){
  const n=re.length;
  for(let i=1,j=0;i<n;i++){ let bit=n>>1; for(;j&bit;bit>>=1) j^=bit; j^=bit;
    if(i<j){ const tr=re[i];re[i]=re[j];re[j]=tr; const ti=im[i];im[i]=im[j];im[j]=ti; } }
  for(let len=2;len<=n;len<<=1){
    const ang=(inv?2:-2)*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
    for(let i=0;i<n;i+=len){ let cwr=1,cwi=0;
      for(let k=0;k<len/2;k++){
        const a=i+k, b=i+k+len/2;
        const vr=re[b]*cwr-im[b]*cwi, vi=re[b]*cwi+im[b]*cwr;
        re[b]=re[a]-vr; im[b]=im[a]-vi; re[a]+=vr; im[a]+=vi;
        const nr=cwr*wr-cwi*wi; cwi=cwr*wi+cwi*wr; cwr=nr;
      }
    }
  }
  if(inv){ for(let i=0;i<n;i++){ re[i]/=n; im[i]/=n; } }
}

function buildFilter(t){
  const fs=256, N=1024, win=512;
  const rng=mulberry32(0x5EED11);
  const comps=[[0.4,1.3],[2.5,0.55],[6,0.5],[10,0.9],[20,0.32],[60,0.75]];  // drift, delta, theta, alpha, beta, 60Hz line
  const ph=comps.map(()=>rng()*6.283);
  const x=new Float64Array(N);
  for(let i=0;i<N;i++){ let v=0; const s=i/fs;
    comps.forEach((c,ci)=> v+=Math.sin(2*Math.PI*c[0]*s+ph[ci])*c[1]);
    v+=(rng()-0.5)*0.24; x[i]=v; }

  const fig=el("figure","demo");
  fig.appendChild(el("p","demo-intro",t.sigIntro));
  const tg=el("div","demo-toggle"); tg.setAttribute("role","group"); tg.setAttribute("aria-label",t.sigTitle);
  tg.innerHTML=`<button type="button" data-f="hp" aria-pressed="false">${t.sigHP}</button><button type="button" data-f="notch" aria-pressed="false">${t.sigNotch}</button>`;
  fig.appendChild(tg);

  const panels=el("div","demo-panels");
  panels.appendChild(el("div","demo-panel",`<h4>${t.sigTime}</h4><svg viewBox="0 0 300 150" role="img" aria-label="${t.sigTime}"><line class="axis" x1="8" y1="72" x2="292" y2="72"/><path class="sig-raw" d=""/><path class="sig-filt" d=""/></svg>`));
  panels.appendChild(el("div","demo-panel",`<h4>${t.sigSpec}</h4><svg viewBox="0 0 300 150" role="img" aria-label="${t.sigSpec}"><line class="axis" x1="30" y1="126" x2="292" y2="126"/><line class="axis" x1="30" y1="12" x2="30" y2="126"/><path class="spec-filt" d=""/><path class="spec-raw" d=""/><g class="ticks"></g></svg>`));
  fig.appendChild(panels);

  const legend=el("div","demo-legend");
  legend.innerHTML=`<span><svg viewBox="0 0 20 8"><line x1="1" y1="4" x2="19" y2="4" stroke="var(--faint)" stroke-width="1.4"/></svg>${t.sigRaw}</span>`+
    `<span><svg viewBox="0 0 20 8"><line x1="1" y1="4" x2="19" y2="4" stroke="var(--signal)" stroke-width="2.2"/></svg>${t.sigFilt}</span>`;
  fig.appendChild(legend);
  const cap=el("p","demo-cap",t.sigCap0); fig.appendChild(cap);

  const sigRaw=fig.querySelector(".sig-raw"), sigFilt=fig.querySelector(".sig-filt");
  const specRawP=fig.querySelector(".spec-raw"), specFiltP=fig.querySelector(".spec-filt");
  const sx=f=>30+(f/80)*262;
  let tks="";
  [0,20,40,60,80].forEach(f=>{ tks+=`<line x1="${sx(f).toFixed(1)}" y1="126" x2="${sx(f).toFixed(1)}" y2="130" stroke="var(--hair)"/><text class="flabel" x="${sx(f).toFixed(1)}" y="140" text-anchor="middle">${f}</text>`; });
  tks+=`<text class="flabel sig" x="${sx(60).toFixed(1)}" y="22" text-anchor="middle">60 Hz</text>`;
  fig.querySelector(".ticks").innerHTML=tks;

  const rre=Float64Array.from(x), rim=new Float64Array(N); fft(rre,rim,false);
  const rawMag=new Float64Array(N/2+1); let maxMag=1e-9;
  for(let k=0;k<=N/2;k++){ rawMag[k]=Math.hypot(rre[k],rim[k]); if(k>0&&k<=320) maxMag=Math.max(maxMag,rawMag[k]); }
  let maxA=1e-9; for(let i=0;i<win;i++) maxA=Math.max(maxA,Math.abs(x[i]));

  const xt=i=>8+(i/(win-1))*284, yt=v=>72-(v/maxA)*54, sy=m=>126-(m/maxMag)*112;
  const pTime=a=>{let d="M "+xt(0).toFixed(1)+" "+yt(a[0]).toFixed(1);for(let i=1;i<win;i++)d+=" L "+xt(i).toFixed(1)+" "+yt(a[i]).toFixed(1);return d;};
  const pLine=m=>{let d="M "+sx(0).toFixed(1)+" "+sy(m[0]).toFixed(1);for(let k=1;k<=320;k++)d+=" L "+sx(k*fs/N).toFixed(1)+" "+sy(m[k]).toFixed(1);return d;};
  const pArea=m=>{let d="M 30 126";for(let k=0;k<=320;k++)d+=" L "+sx(k*fs/N).toFixed(1)+" "+sy(m[k]).toFixed(1);d+=" L "+sx(320*fs/N).toFixed(1)+" 126 Z";return d;};

  sigRaw.setAttribute("d",pTime(x));
  specRawP.setAttribute("d",pLine(rawMag));

  function update(){
    const hp=tg.querySelector('[data-f="hp"]').getAttribute("aria-pressed")==="true";
    const notch=tg.querySelector('[data-f="notch"]').getAttribute("aria-pressed")==="true";
    const re=Float64Array.from(x), im=new Float64Array(N); fft(re,im,false);
    for(let k=0;k<N;k++){ const kk=k<=N/2?k:k-N, f=Math.abs(kk*fs/N);
      if((hp&&f<1)||(notch&&Math.abs(f-60)<2)){ re[k]=0; im[k]=0; } }
    const fm=new Float64Array(N/2+1);
    for(let k=0;k<=N/2;k++) fm[k]=Math.hypot(re[k],im[k]);
    fft(re,im,true);
    sigFilt.setAttribute("d",pTime(re));
    specFiltP.setAttribute("d",pArea(fm));
    cap.innerHTML=(hp&&notch)?t.sigCapBoth:hp?t.sigCapHP:notch?t.sigCapN:t.sigCap0;
  }
  tg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    b.setAttribute("aria-pressed", b.getAttribute("aria-pressed")==="true"?"false":"true"); update();
  }));
  update();
  return fig;
}

/* ---- EEG trace (client-generated, deterministic) ----------------------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeEEGPath(w,h,seed){
  const rnd=mulberry32(seed),mid=h/2,N=520;
  const comps=[[0.010,h*0.11,rnd()*6.28],[0.024,h*0.07,rnd()*6.28],[0.058,h*0.045,rnd()*6.28],[0.12,h*0.02,rnd()*6.28]];
  const pts=[];
  for(let i=0;i<=N;i++){
    const x=i/N*w; let y=mid;
    for(const [f,a,p] of comps) y+=Math.sin(i*f+p)*a;
    y+=(rnd()-0.5)*h*0.05;
    if(rnd()<0.010) y-=(h*0.24)*(0.6+rnd()*0.4); // sparse deflection
    pts.push([x,Math.max(2,Math.min(h-2,y))]);
  }
  return "M "+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L ");
}
function drawTrace(){
  const path=document.getElementById("eeg");
  const d=makeEEGPath(1000,76,20260609);
  path.setAttribute("d",d);
  const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce) return;
  const len=path.getTotalLength();
  path.style.strokeDasharray=len; path.style.strokeDashoffset=len;
  path.getBoundingClientRect(); // reflow
  path.style.transition="stroke-dashoffset 1.7s cubic-bezier(.25,.6,.3,1)";
  requestAnimationFrame(()=>{path.style.strokeDashoffset="0";});
}

/* ---- scroll reveal + figure draw --------------------------------------- */
let io;
function observeSections(){
  if(io) io.disconnect();
  io=new IntersectionObserver((es)=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("in");
        const fig=e.target.querySelector(".fig");
        if(fig) fig.classList.add("drawn");
        io.unobserve(e.target);
      }
    });
  },{threshold:.12});
  document.querySelectorAll(".sec").forEach(s=>io.observe(s));
}

document.querySelectorAll(".lang button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const lang=btn.getAttribute("data-lang");
    document.querySelectorAll(".lang button").forEach(b=>b.setAttribute("aria-pressed", b===btn?"true":"false"));
    render(lang);
  });
});

/* ---- theme toggle (BLK editor / datasheet) ----------------------------- */
// localStorage guarded: persists on GitHub Pages, no-ops in sandboxed previews.
function readTheme(){ try{ return localStorage.getItem("theme"); }catch(e){ return null; } }
function saveTheme(v){ try{ localStorage.setItem("theme",v); }catch(e){} }
function applyTheme(theme){
  if(theme==="dark") document.documentElement.setAttribute("data-theme","dark");
  else document.documentElement.removeAttribute("data-theme");
  document.querySelectorAll(".theme button").forEach(b=>
    b.setAttribute("aria-pressed", b.getAttribute("data-theme-set")===theme ? "true":"false"));
}
document.querySelectorAll(".theme button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const theme=btn.getAttribute("data-theme-set");
    applyTheme(theme); saveTheme(theme);
    // repaint the trace so the new accent picks up immediately
    const p=document.getElementById("eeg"); if(p){ p.style.transition="none"; p.style.strokeDashoffset="0"; }
  });
});

/* ---- init -------------------------------------------------------------- */
const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme:dark)").matches;
applyTheme(readTheme() || (prefersDark ? "dark" : "light"));
render("en");
drawTrace();
